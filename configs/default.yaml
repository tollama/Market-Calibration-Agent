app:
  name: market-calibration-agent
  environment: dev
  timezone: UTC

data:
  raw_dir: data/raw
  processed_dir: data/processed
  cache_dir: data/cache
  prep:
    freq: 5m
    y_definition: mid_or_last
    max_trade_staleness_minutes: 60
    clip_eps: 1.0e-6
    max_gap_minutes: 60

calibration:
  lookback_minutes: 129600
  update_interval_seconds: 3600
  min_volume: 500.0
  confidence_threshold: 0.70
  min_confidence_samples: 30
  conformal:
    state_path: data/derived/calibration/conformal_state.json
    history_path: data/derived/calibration/conformal_history.jsonl
    target_coverage: 0.80
    rolling_window_samples: 2000
    min_samples: 100

features:
  liquidity_thresholds:
    low: 10000
    high: 100000

trust_score:
  weights:
    liquidity_depth: 0.35
    stability: 0.25
    question_quality: 0.25
    manipulation_suspect: 0.15
  component_derivation:
    liquidity_high: 100000
    volatility_ceiling: 0.3
    oi_spike_threshold: 0.30
    velocity_spike_threshold: 3.0

trust_intelligence:
  enabled: true
  formula_version: v3
  conformal_method: auto
  trust_threshold: 0.3
  max_retries: 2
  persist_results: true
  audit:
    enabled: true
    agent_id: mca-daily-pipeline

platforms:
  polymarket:
    enabled: true
    connector: gamma
    base_url: "https://gamma-api.polymarket.com"
    max_retries: 3
    backoff_base: 0.5
    rate_limit_rps: null
    websocket:
      enabled: true
      url: "wss://ws-subscriptions-clob.polymarket.com/ws/market"
  kalshi:
    enabled: false
    connector: kalshi
    base_url: "https://trading-api.kalshi.com/trade-api/v2"
    api_key_id_env: "KALSHI_API_KEY_ID"
    api_key_secret_env: "KALSHI_API_KEY_SECRET"
    max_retries: 3
    websocket:
      enabled: false
  manifold:
    enabled: false
    connector: manifold
    base_url: "https://api.manifold.markets/v0"
    max_retries: 3
    websocket:
      enabled: false

external_trust:
  news_snapshot_path: null          # --news-trust-snapshot override
  financial_snapshot_path: null     # --financial-trust-snapshot override
  symbol_map_path: "configs/market_template_to_symbol_map.yaml"
  default_trust_score: 0.5
  feature_prefix_news: "ext_news_"
  feature_prefix_financial: "ext_fin_"

api:
  tsfm_forecast:
    require_auth: true
    token_env_var: TSFM_FORECAST_API_TOKEN
    rate_limit_per_minute: 6
